<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机任务分配工具</title>
  <meta name="theme-color" content="#1a1a2e">
  <style>
/* ==================== CSS Variables ==================== */
:root {
  /* Spacing */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;
  --spacing-2xl: 48px;
  
  /* Border Radius */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  
  /* Typography */
  --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
  
  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 400ms ease;
  
  /* Group Colors - 用于分组显示的颜色 */
  --group-color-1: #f97316;
  --group-color-2: #8b5cf6;
  --group-color-3: #06b6d4;
  --group-color-4: #10b981;
  --group-color-5: #ec4899;
  --group-color-6: #eab308;
  --group-color-7: #6366f1;
  --group-color-8: #14b8a6;
}

/* ==================== Dark Theme (Default) ==================== */
:root,
[data-theme="dark"] {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-card: #1c2128;
  --bg-hover: #30363d;
  --bg-active: #388bfd26;
  
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --text-link: #58a6ff;
  
  --accent-primary: #238636;
  --accent-primary-hover: #2ea043;
  --accent-secondary: #1f6feb;
  --accent-secondary-hover: #388bfd;
  --accent-warning: #d29922;
  --accent-danger: #da3633;
  --accent-danger-hover: #f85149;
  
  --border-color: #30363d;
  --border-focus: #58a6ff;
  
  --gradient-primary: linear-gradient(135deg, #238636 0%, #1f6feb 100%);
  --gradient-accent: linear-gradient(135deg, #f78166 0%, #fb8532 50%, #d29922 100%);
  --gradient-bg: radial-gradient(ellipse at top, #1c2128 0%, #0d1117 50%);
  
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
  --shadow-glow: 0 0 20px rgba(56, 139, 253, 0.15);
}

/* ==================== Light Theme ==================== */
[data-theme="light"] {
  --bg-primary: #ffffff;
  --bg-secondary: #f6f8fa;
  --bg-tertiary: #eaeef2;
  --bg-card: #ffffff;
  --bg-hover: #d0d7de;
  --bg-active: #ddf4ff;
  
  --text-primary: #1f2328;
  --text-secondary: #656d76;
  --text-muted: #8c959f;
  --text-link: #0969da;
  
  --accent-primary: #1a7f37;
  --accent-primary-hover: #2da44e;
  --accent-secondary: #0969da;
  --accent-secondary-hover: #218bff;
  --accent-warning: #9a6700;
  --accent-danger: #cf222e;
  --accent-danger-hover: #a40e26;
  
  --border-color: #d0d7de;
  --border-focus: #0969da;
  
  --gradient-primary: linear-gradient(135deg, #2da44e 0%, #218bff 100%);
  --gradient-accent: linear-gradient(135deg, #fb8f44 0%, #f9826c 50%, #e16f24 100%);
  --gradient-bg: radial-gradient(ellipse at top, #f6f8fa 0%, #ffffff 50%);
  
  --shadow-sm: 0 1px 2px rgba(31, 35, 40, 0.08);
  --shadow-md: 0 4px 12px rgba(31, 35, 40, 0.12);
  --shadow-lg: 0 8px 24px rgba(31, 35, 40, 0.16);
  --shadow-glow: 0 0 20px rgba(9, 105, 218, 0.1);
}

/* ==================== Reset & Base ==================== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-sans);
  background: var(--gradient-bg);
  background-attachment: fixed;
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

/* ==================== App Container ==================== */
.app-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: var(--spacing-md);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ==================== Header ==================== */
.app-header {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: var(--spacing-md) var(--spacing-lg);
  margin-bottom: var(--spacing-lg);
  box-shadow: var(--shadow-md);
}

.header-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
}

.logo-icon {
  font-size: 2rem;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

.logo h1 {
  font-size: 1.5rem;
  font-weight: 700;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-actions {
  display: flex;
  gap: var(--spacing-sm);
}

.btn-icon {
  width: 40px;
  height: 40px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}

.btn-icon:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--text-muted);
}

.btn-icon:active {
  transform: scale(0.95);
}

/* ==================== Main Content ==================== */
.main-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--spacing-lg);
  flex: 1;
}

@media (max-width: 900px) {
  .main-content {
    grid-template-columns: 1fr;
  }
}

/* ==================== Panels ==================== */
.input-panel,
.result-panel {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: var(--spacing-lg);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-lg);
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: var(--spacing-sm);
  border-bottom: 1px solid var(--border-color);
}

.section-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
}

/* ==================== Saved Groups ==================== */
.saved-groups-section {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}

.saved-groups-list {
  display: flex;
  flex-wrap: wrap;
  gap: var(--spacing-sm);
  max-height: 100px;
  overflow-y: auto;
  padding: var(--spacing-xs);
}

.saved-group-item {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs);
  padding: var(--spacing-xs) var(--spacing-sm);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 0.85rem;
}

.saved-group-item:hover {
  background: var(--bg-hover);
  border-color: var(--accent-secondary);
}

.saved-group-item.active {
  background: var(--bg-active);
  border-color: var(--accent-secondary);
}

.saved-group-delete {
  width: 18px;
  height: 18px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  line-height: 1;
  transition: all var(--transition-fast);
}

.saved-group-delete:hover {
  background: var(--accent-danger);
  color: white;
}

/* ==================== Input Section ==================== */
.input-section {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}

.input-label {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.label-icon {
  font-size: 1rem;
}

.count-badge {
  background: var(--bg-tertiary);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.75rem;
  font-family: var(--font-mono);
  color: var(--text-muted);
  margin-left: auto;
}

.input-textarea {
  width: 100%;
  padding: var(--spacing-md);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.95rem;
  resize: vertical;
  min-height: 120px;
  transition: all var(--transition-fast);
}

.input-textarea:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: var(--shadow-glow);
}

.input-textarea::placeholder {
  color: var(--text-muted);
}

/* ==================== Buttons ==================== */
.btn-primary {
  padding: var(--spacing-md) var(--spacing-xl);
  background: var(--gradient-primary);
  border: none;
  border-radius: var(--radius-md);
  color: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--spacing-sm);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.btn-primary:active:not(:disabled) {
  transform: translateY(0);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: var(--bg-tertiary);
}

.btn-start {
  width: 100%;
  padding: var(--spacing-lg);
  font-size: 1.1rem;
}

.btn-start:not(:disabled) {
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.4); }
  50% { box-shadow: 0 0 0 10px rgba(35, 134, 54, 0); }
}

.btn-secondary {
  padding: var(--spacing-sm) var(--spacing-md);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.btn-secondary:hover {
  background: var(--bg-hover);
}

.btn-danger {
  padding: var(--spacing-sm) var(--spacing-md);
  background: var(--accent-danger);
  border: none;
  border-radius: var(--radius-md);
  color: white;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.btn-danger:hover {
  background: var(--accent-danger-hover);
}

.btn-small {
  padding: var(--spacing-xs) var(--spacing-sm);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 0.8rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: all var(--transition-fast);
}

.btn-small:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.btn-save {
  border-color: var(--accent-primary);
  color: var(--accent-primary);
}

.btn-save:hover {
  background: var(--accent-primary);
  color: white;
}

.btn-clear:hover {
  background: var(--accent-danger);
  border-color: var(--accent-danger);
  color: white;
}

/* ==================== Result Container ==================== */
.result-container {
  flex: 1;
  overflow-y: auto;
  min-height: 300px;
}

.empty-result,
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 200px;
  color: var(--text-muted);
  text-align: center;
}

.empty-icon {
  font-size: 4rem;
  margin-bottom: var(--spacing-md);
  opacity: 0.5;
}

.empty-hint {
  font-size: 0.85rem;
  margin-top: var(--spacing-xs);
  opacity: 0.7;
}

/* Result Cards */
.result-list {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md);
}

.result-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  padding: var(--spacing-md);
  animation: slideIn var(--transition-normal) ease-out;
  border-left: 4px solid var(--group-color, var(--border-color));
}

/* 分组结果样式 */
.result-group {
  margin-bottom: var(--spacing-lg);
}

.result-group-header {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  margin-bottom: var(--spacing-sm);
  padding: var(--spacing-sm) var(--spacing-md);
  background: var(--bg-tertiary);
  border-radius: var(--radius-md);
  border-left: 4px solid var(--group-color, var(--accent-secondary));
}

.result-group-color {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

.result-group-tasks {
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
}

.result-group-count {
  font-size: 0.85rem;
  color: var(--text-muted);
  background: var(--bg-hover);
  padding: 2px 8px;
  border-radius: 10px;
}

.result-group-persons {
  display: flex;
  flex-wrap: wrap;
  gap: var(--spacing-sm);
  padding-left: var(--spacing-md);
}

.result-person-tag {
  display: inline-flex;
  align-items: center;
  gap: var(--spacing-xs);
  padding: var(--spacing-xs) var(--spacing-sm);
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  color: var(--text-primary);
  border-left: 3px solid var(--group-color, var(--accent-secondary));
  animation: slideIn var(--transition-normal) ease-out;
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.result-card-header {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  margin-bottom: var(--spacing-sm);
  padding-bottom: var(--spacing-sm);
  border-bottom: 1px solid var(--border-color);
}

.result-person {
  font-weight: 600;
  color: var(--text-link);
}

.result-tasks {
  display: flex;
  flex-wrap: wrap;
  gap: var(--spacing-xs);
}

.result-task-tag {
  padding: var(--spacing-xs) var(--spacing-sm);
  background: var(--bg-hover);
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  color: var(--text-primary);
}

.result-no-task {
  color: var(--text-muted);
  font-style: italic;
  font-size: 0.85rem;
}

/* ==================== Modal ==================== */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all var(--transition-normal);
}

.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-xl);
  width: 90%;
  max-width: 500px;
  max-height: 90vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transform: scale(0.9) translateY(20px);
  transition: transform var(--transition-normal);
}

.modal-overlay.active .modal {
  transform: scale(1) translateY(0);
}

.modal-large {
  max-width: 700px;
}

.modal-small {
  max-width: 400px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--spacing-lg);
  border-bottom: 1px solid var(--border-color);
}

.modal-header h2 {
  font-size: 1.2rem;
  font-weight: 600;
}

.btn-close {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 1.5rem;
  cursor: pointer;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}

.btn-close:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.modal-body {
  padding: var(--spacing-lg);
  overflow-y: auto;
  flex: 1;
  min-height: 200px;
  max-height: 60vh;
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: var(--spacing-sm);
  padding: var(--spacing-lg);
  border-top: 1px solid var(--border-color);
}

/* ==================== Settings ==================== */
.setting-group {
  margin-bottom: var(--spacing-xl);
}

.setting-group:last-child {
  margin-bottom: 0;
}

.setting-label {
  display: block;
  font-weight: 600;
  margin-bottom: var(--spacing-md);
  color: var(--text-primary);
}

.setting-hint {
  display: block;
  margin-top: var(--spacing-sm);
  color: var(--text-muted);
  font-size: 0.85rem;
}

.radio-group {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}

.radio-item {
  display: flex;
  align-items: flex-start;
  gap: var(--spacing-sm);
  padding: var(--spacing-md);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.radio-item:hover {
  background: var(--bg-hover);
}

.radio-item input[type="radio"] {
  display: none;
}

.radio-custom {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-color);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 2px;
  position: relative;
  transition: all var(--transition-fast);
}

.radio-item input[type="radio"]:checked + .radio-custom {
  border-color: var(--accent-secondary);
}

.radio-item input[type="radio"]:checked + .radio-custom::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 10px;
  height: 10px;
  background: var(--accent-secondary);
  border-radius: 50%;
}

.radio-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.radio-text strong {
  color: var(--text-primary);
  font-weight: 500;
}

.radio-text small {
  color: var(--text-muted);
  font-size: 0.8rem;
}

/* Number Input */
.number-input-wrapper {
  display: flex;
  align-items: center;
  gap: var(--spacing-xs);
  width: fit-content;
}

.btn-number {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}

.btn-number:hover {
  background: var(--bg-hover);
  border-color: var(--accent-secondary);
}

.number-input {
  width: 60px;
  height: 36px;
  text-align: center;
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 1rem;
}

.number-input:focus {
  outline: none;
  border-color: var(--border-focus);
}

/* Text Input */
.text-input {
  width: 100%;
  padding: var(--spacing-md);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 1rem;
  transition: all var(--transition-fast);
}

.text-input:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: var(--shadow-glow);
}

/* ==================== History ==================== */
.history-list {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md);
}

.history-item {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  overflow: hidden;
}

.history-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--spacing-md);
  background: var(--bg-card);
  cursor: pointer;
  transition: background var(--transition-fast);
}

.history-time {
  font-size: 0.9rem;
  color: var(--text-primary);
  font-family: var(--font-mono);
}

.history-group-name {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-left: var(--spacing-sm);
}

.history-item-header:hover {
  background: var(--bg-hover);
}

.history-actions {
  display: flex;
  gap: var(--spacing-xs);
}

.history-item-body {
  padding: var(--spacing-md);
  display: none;
  border-top: 1px solid var(--border-color);
  background: var(--bg-card);
  color: var(--text-primary);
  max-height: 200px;
  overflow-y: auto;
}

.history-item.expanded .history-item-body {
  display: block;
}

.history-result-list {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}

.history-result-item {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--spacing-sm);
  padding: var(--spacing-sm) var(--spacing-md);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
}

.history-result-person {
  font-weight: 600;
  color: var(--text-link);
  min-width: 80px;
}

.history-result-tasks {
  display: flex;
  flex-wrap: wrap;
  gap: var(--spacing-xs);
  flex: 1;
}

.history-result-tag {
  padding: 2px 8px;
  background: var(--bg-hover);
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  color: var(--text-primary);
}

.history-result-tasks em {
  color: var(--text-muted);
  font-size: 0.85rem;
}

/* ==================== Toast ==================== */
.toast-container {
  position: fixed;
  bottom: var(--spacing-lg);
  right: var(--spacing-lg);
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: var(--spacing-sm);
}

.toast {
  padding: var(--spacing-md) var(--spacing-lg);
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  box-shadow: var(--shadow-lg);
  animation: toastIn var(--transition-normal) ease-out;
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
}

@keyframes toastIn {
  from {
    opacity: 0;
    transform: translateX(100%);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.toast.success {
  border-left: 4px solid var(--accent-primary);
}

.toast.error {
  border-left: 4px solid var(--accent-danger);
}

.toast.warning {
  border-left: 4px solid var(--accent-warning);
}

/* ==================== Scrollbar ==================== */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg-tertiary);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb {
  background: var(--bg-hover);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-muted);
}

/* ==================== Responsive ==================== */
@media (max-width: 600px) {
  .app-container {
    padding: var(--spacing-sm);
  }
  
  .app-header {
    padding: var(--spacing-sm) var(--spacing-md);
  }
  
  .logo h1 {
    font-size: 1.2rem;
  }
  
  .input-panel,
  .result-panel {
    padding: var(--spacing-md);
  }

    width: 95%;
    margin: var(--spacing-sm);
  }
  
  .toast-container {
    left: var(--spacing-sm);
    right: var(--spacing-sm);
    bottom: var(--spacing-sm);
  }
  
  .toast {
    width: 100%;
  }
}

  <script>
/**
 * 随机任务分配工具
 * 支持离线操作、数据保存、历史记录、规则配置
 */

// ==================== 常量定义 ====================
const STORAGE_KEYS = {
  GROUPS: 'task_assignment_groups',
  HISTORY: 'task_assignment_history',
  SETTINGS: 'task_assignment_settings',
  THEME: 'task_assignment_theme'
};

// 分组颜色列表
const GROUP_COLORS = [
  '#f97316', // orange
  '#8b5cf6', // violet
  '#06b6d4', // cyan
  '#10b981', // emerald
  '#ec4899', // pink
  '#eab308', // yellow
  '#6366f1', // indigo
  '#14b8a6', // teal
];

const DEFAULT_SETTINGS = {
  taskMoreThanPerson: 'random',  // 'average' | 'random'
  taskLessThanPerson: 'repeat',  // 'repeat' | 'partial'
  taskLimit: 1,
  taskRepeatLimit: 1  // 每个任务最多可以分配给几个人
};

// ==================== 状态管理 ====================
let state = {
  groups: [],
  history: [],
  settings: { ...DEFAULT_SETTINGS },
  currentGroupId: null
};

// ==================== DOM 元素 ====================
const elements = {
  // 输入
  tasksInput: document.getElementById('tasksInput'),
  personsInput: document.getElementById('personsInput'),
  taskCount: document.getElementById('taskCount'),
  personCount: document.getElementById('personCount'),
  startBtn: document.getElementById('startBtn'),
  
  // 保存的组合
  savedGroupsList: document.getElementById('savedGroupsList'),
  saveGroupBtn: document.getElementById('saveGroupBtn'),
  
  // 结果
  resultContainer: document.getElementById('resultContainer'),
  clearResultBtn: document.getElementById('clearResultBtn'),
  
  // 设置弹窗
  settingsBtn: document.getElementById('settingsBtn'),
  settingsModal: document.getElementById('settingsModal'),
  closeSettingsBtn: document.getElementById('closeSettingsBtn'),
  resetSettingsBtn: document.getElementById('resetSettingsBtn'),
  saveSettingsBtn: document.getElementById('saveSettingsBtn'),
  taskLimitInput: document.getElementById('taskLimitInput'),
  decreaseLimit: document.getElementById('decreaseLimit'),
  increaseLimit: document.getElementById('increaseLimit'),
  taskRepeatLimitInput: document.getElementById('taskRepeatLimitInput'),
  decreaseRepeatLimit: document.getElementById('decreaseRepeatLimit'),
  increaseRepeatLimit: document.getElementById('increaseRepeatLimit'),
  themeToggleBtn: document.getElementById('themeToggleBtn'),
  
  // 历史弹窗
  historyBtn: document.getElementById('historyBtn'),
  historyModal: document.getElementById('historyModal'),
  closeHistoryBtn: document.getElementById('closeHistoryBtn'),
  historyList: document.getElementById('historyList'),
  clearHistoryBtn: document.getElementById('clearHistoryBtn'),
  
  // 保存组合弹窗
  saveGroupModal: document.getElementById('saveGroupModal'),
  closeSaveGroupBtn: document.getElementById('closeSaveGroupBtn'),
  cancelSaveGroupBtn: document.getElementById('cancelSaveGroupBtn'),
  confirmSaveGroupBtn: document.getElementById('confirmSaveGroupBtn'),
  groupNameInput: document.getElementById('groupNameInput'),
  
  // Toast
  toastContainer: document.getElementById('toastContainer')
};

// ==================== 工具函数 ====================

/**
 * 解析文本输入为数组（按行分割，过滤空行）
 */
function parseInput(text) {
  return text
    .split('\n')
    .map(line => line.trim())
    .filter(line => line.length > 0);
}

/**
 * 打乱数组（Fisher-Yates 洗牌算法）
 */
function shuffleArray(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/**
 * 显示 Toast 提示
 */
function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <span>${type === 'success' ? '✓' : type === 'error' ? '✗' : '⚠'}</span>
    <span>${message}</span>
  `;
  elements.toastContainer.appendChild(toast);
  
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

/**
 * 格式化时间
 */
function formatTime(timestamp) {
  const date = new Date(timestamp);
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  const hours = String(date.getHours()).padStart(2, '0');
  const minutes = String(date.getMinutes()).padStart(2, '0');
  return `${year}-${month}-${day} ${hours}:${minutes}`;
}

/**
 * 生成唯一 ID
 */
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2);
}

// ==================== 存储操作 ====================

function loadFromStorage() {
  try {
    const groups = localStorage.getItem(STORAGE_KEYS.GROUPS);
    const history = localStorage.getItem(STORAGE_KEYS.HISTORY);
    const settings = localStorage.getItem(STORAGE_KEYS.SETTINGS);
    
    state.groups = groups ? JSON.parse(groups) : [];
    state.history = history ? JSON.parse(history) : [];
    state.settings = settings ? { ...DEFAULT_SETTINGS, ...JSON.parse(settings) } : { ...DEFAULT_SETTINGS };
  } catch (e) {
    console.error('Failed to load from storage:', e);
    state.groups = [];
    state.history = [];
    state.settings = { ...DEFAULT_SETTINGS };
    state.currentGroupId = null;
  }
}

// ==================== 主题切换 ====================

function loadTheme() {
  const savedTheme = localStorage.getItem(STORAGE_KEYS.THEME);
  const theme = savedTheme || 'dark';
  applyTheme(theme);
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeIcon(theme);
  localStorage.setItem(STORAGE_KEYS.THEME, theme);
}

function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(newTheme);
}

function updateThemeIcon(theme) {
  const sunIcon = elements.themeToggleBtn.querySelector('.icon-sun');
  const moonIcon = elements.themeToggleBtn.querySelector('.icon-moon');
  
  if (theme === 'dark') {
    sunIcon.style.display = 'block';
    moonIcon.style.display = 'none';
  } else {
    sunIcon.style.display = 'none';
    moonIcon.style.display = 'block';
  }
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEYS.GROUPS, JSON.stringify(state.groups));
    localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(state.history));
    localStorage.setItem(STORAGE_KEYS.SETTINGS, JSON.stringify(state.settings));
  } catch (e) {
    console.error('Failed to save to storage:', e);
    showToast('存储空间不足，请删除部分数据', 'error');
  }
}

// ==================== 分配算法 ====================

/**
 * 执行任务分配
 * 
 * 分配规则说明：
 * - taskLimit：每人任务数量上限，每个人分配的任务不能超过此上限
 * - taskRepeatLimit：任务重复次数上限，每个任务最多可以分配给几个人
 * - 当任务 >= 人数时：
 *   - 平均分配：尽量平均，但每人不超过 taskLimit
 *   - 纯随机：先每人一个，剩余随机分配，但每人不超过 taskLimit
 * - 当任务 < 人数时：
 *   - 允许任务重复：每个人都能获得任务（最多 taskLimit 个），每个任务最多重复 taskRepeatLimit 次
 *   - 部分人无任务：每个任务只分配给一个人，部分人无任务
 */
function assignTasks(tasks, persons, settings) {
  const taskCount = tasks.length;
  const personCount = persons.length;
  const { taskMoreThanPerson, taskLessThanPerson, taskLimit, taskRepeatLimit = 1 } = settings;
  
  // 初始化结果：每个人的任务列表
  const result = {};
  persons.forEach(person => {
    result[person] = [];
  });
  
  // 复制任务列表用于分配
  let availableTasks = [...tasks];
  let shuffledPersons = shuffleArray([...persons]);
  
  if (taskCount >= personCount) {
    // 任务数量 >= 人数
    
    if (taskMoreThanPerson === 'average') {
      // 平均分配：尽量让每个人分配到的任务数量相近，但不超过 taskLimit
      availableTasks = shuffleArray(availableTasks);
      let taskIndex = 0;
      
      // 计算在 taskLimit 限制下，最多能分配多少任务
      const maxAssignable = personCount * taskLimit;
      const actualTasksToAssign = Math.min(taskCount, maxAssignable);
      
      // 计算每人分配多少个
      const tasksPerPerson = Math.floor(actualTasksToAssign / personCount);
      const remainder = actualTasksToAssign % personCount;
      
      shuffledPersons.forEach((person, personIndex) => {
        // 前 remainder 个人多分配 1 个任务，但不超过 taskLimit
        const extraTask = personIndex < remainder ? 1 : 0;
        const count = Math.min(tasksPerPerson + extraTask, taskLimit);
        
        for (let i = 0; i < count && taskIndex < taskCount; i++) {
          result[person].push(availableTasks[taskIndex++]);
        }
      });
    } else {
      // 纯随机分配：先确保每人至少一个任务（不超过 taskLimit），剩余任务随机分配
      availableTasks = shuffleArray(availableTasks);
      let taskIndex = 0;
      
      // 第一轮：每人分配一个任务（保证每人都有，如果 taskLimit >= 1）
      if (taskLimit >= 1) {
        shuffledPersons.forEach(person => {
          if (taskIndex < taskCount) {
            result[person].push(availableTasks[taskIndex++]);
          }
        });
      }
      
      // 第二轮：剩余任务随机分配给未达上限的人
      while (taskIndex < taskCount) {
        // 找出还没达到上限的人
        const eligiblePersons = shuffledPersons.filter(p => result[p].length < taskLimit);
        
        if (eligiblePersons.length === 0) {
          // 所有人都达到上限了，剩余任务无法分配
          break;
        }
        
        const randomPerson = eligiblePersons[Math.floor(Math.random() * eligiblePersons.length)];
        result[randomPerson].push(availableTasks[taskIndex++]);
      }
    }
  } else {
    // 任务数量 < 人数
    if (taskLessThanPerson === 'repeat') {
      // 允许任务重复：每个人都可以分配任务
      // taskLimit 生效：限制每个人最多分配几个任务
      // taskRepeatLimit 生效：限制每个任务最多分配给几个人
      
      // 创建任务池：每个任务可以被分配 taskRepeatLimit 次
      const taskPool = [];
      availableTasks.forEach(task => {
        for (let i = 0; i < taskRepeatLimit; i++) {
          taskPool.push(task);
        }
      });
      
      // 打乱任务池
      const shuffledTaskPool = shuffleArray(taskPool);
      let poolIndex = 0;
      
      // 给每个人分配任务
      shuffledPersons.forEach(person => {
        const count = Math.min(taskLimit, taskCount); // 每人最多分配 taskLimit 个，但不超过任务总数
        const personTasks = [];
        const usedTasks = new Set(); // 避免同一个人拿到重复的同一个任务
        
        for (let i = 0; i < shuffledTaskPool.length && personTasks.length < count; i++) {
          const task = shuffledTaskPool[(poolIndex + i) % shuffledTaskPool.length];
          if (!usedTasks.has(task)) {
            personTasks.push(task);
            usedTasks.add(task);
          }
        }
        
        result[person] = personTasks;
        poolIndex += count; // 移动指针，让不同人拿到不同的任务组合
      });
    } else {
      // 部分人无任务：每个任务只分配给一个人，任务不够则部分人无任务
      // taskLimit 也生效：每人最多分配 taskLimit 个任务
      availableTasks = shuffleArray(availableTasks);
      shuffledPersons = shuffleArray(shuffledPersons);
      
      let taskIndex = 0;
      let personIndex = 0;
      
      while (taskIndex < taskCount && personIndex < personCount) {
        const person = shuffledPersons[personIndex];
        const currentCount = result[person].length;
        
        if (currentCount < taskLimit && taskIndex < taskCount) {
          result[person].push(availableTasks[taskIndex++]);
        }
        
        // 如果这个人达到上限了，或者分配了一个任务，换下一个人
        if (result[person].length >= taskLimit || result[person].length >= 1) {
          personIndex++;
        }
      }
    }
  }
  
  return result;
}

// ==================== UI 更新 ====================

function updateInputCounts() {
  const tasks = parseInput(elements.tasksInput.value);
  const persons = parseInput(elements.personsInput.value);
  
  elements.taskCount.textContent = tasks.length;
  elements.personCount.textContent = persons.length;
  
  // 启用/禁用开始按钮
  elements.startBtn.disabled = tasks.length === 0 || persons.length === 0;
}

function renderSavedGroups() {
  if (state.groups.length === 0) {
    elements.savedGroupsList.innerHTML = '<div class="empty-state">暂无已保存的组合</div>';
    return;
  }
  
  elements.savedGroupsList.innerHTML = state.groups.map(group => `
    <div class="saved-group-item ${state.currentGroupId === group.id ? 'active' : ''}" data-id="${group.id}">
      <span class="saved-group-name">${group.name}</span>
      <button class="saved-group-delete" data-id="${group.id}" title="删除">×</button>
    </div>
  `).join('');
  
  // 绑定点击事件
  elements.savedGroupsList.querySelectorAll('.saved-group-item').forEach(item => {
    item.addEventListener('click', (e) => {
      if (e.target.classList.contains('saved-group-delete')) {
        e.stopPropagation();
        deleteGroup(e.target.dataset.id);
      } else {
        loadGroup(item.dataset.id);
      }
    });
  });
}

function renderResult(result) {
  // 按任务结果分组：将相同任务的人员归到一组
  const groupedByTasks = {};
  
  Object.entries(result).forEach(([person, tasks]) => {
    // 将任务列表排序后作为 key，确保相同任务的分到一组
    const taskKey = tasks.length > 0 ? tasks.slice().sort().join('|||') : '__NO_TASK__';
    
    if (!groupedByTasks[taskKey]) {
      groupedByTasks[taskKey] = {
        tasks: tasks,
        persons: []
      };
    }
    groupedByTasks[taskKey].persons.push(person);
  });
  
  // 转换为数组并排序（按任务数量降序，无任务的放最后）
  const groups = Object.values(groupedByTasks).sort((a, b) => {
    if (a.tasks.length === 0) return 1;
    if (b.tasks.length === 0) return -1;
    return b.tasks.length - a.tasks.length;
  });
  
  // 渲染分组结果
  elements.resultContainer.innerHTML = `
    <div class="result-list">
      ${groups.map((group, groupIndex) => {
        const color = group.tasks.length > 0 
          ? GROUP_COLORS[groupIndex % GROUP_COLORS.length] 
          : 'var(--text-muted)';
        
        return `
          <div class="result-group" style="animation-delay: ${groupIndex * 100}ms">
            <div class="result-group-header" style="--group-color: ${color}">
              <div class="result-group-color" style="background: ${color}"></div>
              <span class="result-group-tasks">
                ${group.tasks.length > 0 
                  ? group.tasks.map(t => `📌 ${t}`).join('、')
                  : '🚫 无任务'
                }
              </span>
              <span class="result-group-count">${group.persons.length} 人</span>
            </div>
            <div class="result-group-persons">
              ${group.persons.map((person, personIndex) => `
                <span class="result-person-tag" style="--group-color: ${color}; animation-delay: ${groupIndex * 100 + personIndex * 30}ms">
                  👤 ${person}
                </span>
              `).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
  
  elements.clearResultBtn.style.display = 'flex';
}

function clearResult() {
  elements.resultContainer.innerHTML = `
    <div class="empty-result">
      <div class="empty-icon">🎯</div>
      <p>输入任务和人员后，点击"开始分配"</p>
      <p class="empty-hint">分配结果将在这里显示</p>
    </div>
  `;
  elements.clearResultBtn.style.display = 'none';
}

function renderHistory() {
  if (state.history.length === 0) {
    elements.historyList.innerHTML = '<div class="empty-state">暂无分配历史记录</div>';
    return;
  }
  
  elements.historyList.innerHTML = state.history.map(item => `
    <div class="history-item" data-id="${item.id}">
      <div class="history-item-header">
        <div>
          <span class="history-time">${formatTime(item.timestamp)}</span>
          ${item.groupName ? `<span class="history-group-name">「${item.groupName}」</span>` : ''}
        </div>
        <div class="history-actions">
          <button class="btn-small history-view-btn" data-id="${item.id}">查看</button>
          <button class="btn-small btn-clear history-delete-btn" data-id="${item.id}">删除</button>
        </div>
      </div>
      <div class="history-item-body">
        ${renderHistoryResult(item.result)}
      </div>
    </div>
  `).join('');
  
  // 绑定事件
  elements.historyList.querySelectorAll('.history-view-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const item = e.target.closest('.history-item');
      item.classList.toggle('expanded');
    });
  });
  
  elements.historyList.querySelectorAll('.history-delete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteHistory(e.target.dataset.id);
    });
  });
}

function renderHistoryResult(result) {
  // 检查 result 是否为对象
  if (!result || typeof result !== 'object') {
    return '<div class="history-result-empty">无分配结果数据</div>';
  }
  
  const entries = Object.entries(result);
  
  if (entries.length === 0) {
    return '<div class="history-result-empty">无分配结果数据</div>';
  }
  
  return `
    <div class="history-result-list">
      ${entries.map(([person, tasks]) => `
        <div class="history-result-item">
          <span class="history-result-person">👤 ${person}</span>
          <span class="history-result-tasks">
            ${Array.isArray(tasks) && tasks.length > 0 
              ? tasks.map(t => `<span class="history-result-tag">📌 ${t}</span>`).join('') 
              : '<em>无任务</em>'
            }
          </span>
        </div>
      `).join('')}
    </div>
  `;
}

function updateSettingsUI() {
  // 任务大于人数
  document.querySelectorAll('input[name="taskMoreThanPerson"]').forEach(radio => {
    radio.checked = radio.value === state.settings.taskMoreThanPerson;
  });
  
  // 任务少于人数
  document.querySelectorAll('input[name="taskLessThanPerson"]').forEach(radio => {
    radio.checked = radio.value === state.settings.taskLessThanPerson;
  });
  
  // 每人任务数量上限
  elements.taskLimitInput.value = state.settings.taskLimit;
  
  // 任务重复次数上限
  elements.taskRepeatLimitInput.value = state.settings.taskRepeatLimit;
}

// ==================== 业务逻辑 ====================

function loadGroup(groupId) {
  const group = state.groups.find(g => g.id === groupId);
  if (!group) return;
  
  state.currentGroupId = groupId;
  elements.tasksInput.value = group.tasks.join('\n');
  elements.personsInput.value = group.persons.join('\n');
  
  updateInputCounts();
  renderSavedGroups();
  showToast(`已加载「${group.name}」`, 'success');
}

function deleteGroup(groupId) {
  const group = state.groups.find(g => g.id === groupId);
  if (!group) return;
  
  if (confirm(`确定要删除「${group.name}」吗？`)) {
    state.groups = state.groups.filter(g => g.id !== groupId);
    if (state.currentGroupId === groupId) {
      state.currentGroupId = null;
    }
    saveToStorage();
    renderSavedGroups();
    showToast('组合已删除', 'success');
  }
}

function saveGroup(name) {
  const tasks = parseInput(elements.tasksInput.value);
  const persons = parseInput(elements.personsInput.value);
  
  if (tasks.length === 0 || persons.length === 0) {
    showToast('请先输入任务和人员', 'error');
    return;
  }
  
  // 检查是否存在同名组合
  const existing = state.groups.find(g => g.name === name);
  if (existing) {
    if (confirm(`组合「${name}」已存在，是否覆盖？`)) {
      existing.tasks = tasks;
      existing.persons = persons;
      existing.updatedAt = Date.now();
      state.currentGroupId = existing.id;
    } else {
      return;
    }
  } else {
    const newGroup = {
      id: generateId(),
      name,
      tasks,
      persons,
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    state.groups.unshift(newGroup);
    state.currentGroupId = newGroup.id;
  }
  
  saveToStorage();
  renderSavedGroups();
  closeModal(elements.saveGroupModal);
  showToast(`组合「${name}」已保存`, 'success');
}

function deleteHistory(historyId) {
  state.history = state.history.filter(h => h.id !== historyId);
  saveToStorage();
  renderHistory();
  showToast('历史记录已删除', 'success');
}

function clearAllHistory() {
  if (confirm('确定要清空所有历史记录吗？')) {
    state.history = [];
    saveToStorage();
    renderHistory();
    showToast('历史记录已清空', 'success');
  }
}

function executeAssignment() {
  const tasks = parseInput(elements.tasksInput.value);
  const persons = parseInput(elements.personsInput.value);
  
  if (tasks.length === 0 || persons.length === 0) {
    showToast('请同时输入任务和人员', 'error');
    return;
  }
  
  // 执行分配
  const result = assignTasks(tasks, persons, state.settings);
  
  // 渲染结果
  renderResult(result);
  
  // 保存到历史
  const currentGroup = state.groups.find(g => g.id === state.currentGroupId);
  const historyItem = {
    id: generateId(),
    timestamp: Date.now(),
    groupName: currentGroup ? currentGroup.name : null,
    tasks,
    persons,
    settings: { ...state.settings },
    result
  };
  
  state.history.unshift(historyItem);
  
  // 限制历史记录数量（最多200条）
  if (state.history.length > 200) {
    state.history = state.history.slice(0, 200);
  }
  
  saveToStorage();
  showToast('分配完成！', 'success');
}

// ==================== 弹窗控制 ====================

function openModal(modal) {
  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(modal) {
  modal.classList.remove('active');
  document.body.style.overflow = '';
}

// ==================== 事件绑定 ====================

function bindEvents() {
  // 主题切换
  elements.themeToggleBtn.addEventListener('click', toggleTheme);
  
  // 输入监听
  elements.tasksInput.addEventListener('input', updateInputCounts);
  elements.personsInput.addEventListener('input', updateInputCounts);
  
  // 开始分配
  elements.startBtn.addEventListener('click', executeAssignment);
  
  // 清空结果
  elements.clearResultBtn.addEventListener('click', clearResult);
  
  // 保存组合
  elements.saveGroupBtn.addEventListener('click', () => {
    const tasks = parseInput(elements.tasksInput.value);
    const persons = parseInput(elements.personsInput.value);
    
    if (tasks.length === 0 || persons.length === 0) {
      showToast('请先输入任务和人员', 'error');
      return;
    }
    
    elements.groupNameInput.value = '';
    openModal(elements.saveGroupModal);
    elements.groupNameInput.focus();
  });
  
  elements.closeSaveGroupBtn.addEventListener('click', () => closeModal(elements.saveGroupModal));
  elements.cancelSaveGroupBtn.addEventListener('click', () => closeModal(elements.saveGroupModal));
  elements.confirmSaveGroupBtn.addEventListener('click', () => {
    const name = elements.groupNameInput.value.trim();
    if (!name) {
      showToast('请输入组合名称', 'error');
      return;
    }
    saveGroup(name);
  });
  
  elements.groupNameInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      elements.confirmSaveGroupBtn.click();
    }
  });
  
  // 设置弹窗
  elements.settingsBtn.addEventListener('click', () => {
    updateSettingsUI();
    openModal(elements.settingsModal);
  });
  
  elements.closeSettingsBtn.addEventListener('click', () => closeModal(elements.settingsModal));
  
  elements.resetSettingsBtn.addEventListener('click', () => {
    state.settings = { ...DEFAULT_SETTINGS };
    updateSettingsUI();
    showToast('已恢复默认设置', 'success');
  });
  
  elements.saveSettingsBtn.addEventListener('click', () => {
    // 读取设置
    state.settings.taskMoreThanPerson = document.querySelector('input[name="taskMoreThanPerson"]:checked').value;
    state.settings.taskLessThanPerson = document.querySelector('input[name="taskLessThanPerson"]:checked').value;
    state.settings.taskLimit = parseInt(elements.taskLimitInput.value) || 1;
    state.settings.taskRepeatLimit = parseInt(elements.taskRepeatLimitInput.value) || 1;
    
    saveToStorage();
    closeModal(elements.settingsModal);
    showToast('设置已保存', 'success');
  });
  
  // 每人任务数量增减
  elements.decreaseLimit.addEventListener('click', () => {
    const current = parseInt(elements.taskLimitInput.value) || 1;
    elements.taskLimitInput.value = Math.max(1, current - 1);
  });
  
  elements.increaseLimit.addEventListener('click', () => {
    const current = parseInt(elements.taskLimitInput.value) || 1;
    elements.taskLimitInput.value = Math.min(100, current + 1);
  });
  
  // 任务重复次数增减
  elements.decreaseRepeatLimit.addEventListener('click', () => {
    const current = parseInt(elements.taskRepeatLimitInput.value) || 1;
    elements.taskRepeatLimitInput.value = Math.max(1, current - 1);
  });
  
  elements.increaseRepeatLimit.addEventListener('click', () => {
    const current = parseInt(elements.taskRepeatLimitInput.value) || 1;
    elements.taskRepeatLimitInput.value = Math.min(100, current + 1);
  });
  
  // 历史弹窗
  elements.historyBtn.addEventListener('click', () => {
    renderHistory();
    openModal(elements.historyModal);
  });
  
  elements.closeHistoryBtn.addEventListener('click', () => closeModal(elements.historyModal));
  elements.clearHistoryBtn.addEventListener('click', clearAllHistory);
  
  // 点击遮罩关闭弹窗
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        closeModal(overlay);
      }
    });
  });
  
  // ESC 键关闭弹窗
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay.active').forEach(modal => {
        closeModal(modal);
      });
    }
  });
}

// ==================== 初始化 ====================

function init() {
  loadTheme();
  loadFromStorage();
  updateInputCounts();
  renderSavedGroups();
  updateSettingsUI();
  bindEvents();
}

// 启动应用
document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
