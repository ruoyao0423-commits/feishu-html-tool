<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运转盘</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Outfit:wght@600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f5f5f8;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.35);
            --accent-secondary: #f97316;
            --text-primary: #18181b;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --border: #e5e7eb;
            --success: #16a34a;
            --danger: #dc2626;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(251, 191, 36, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 10%, rgba(236, 72, 153, 0.08) 0%, transparent 65%);
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(15,23,42,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15,23,42,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            min-height: 100vh;
            align-items: start;
        }

        @media (max-width: 1000px) {
            .app-container {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }

        /* 标题区域 */
        header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px var(--accent-glow);
            letter-spacing: -2px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 400;
        }

        /* 转盘区域 */
        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
        }

        .wheel-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wheel-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(40px);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .wheel-wrapper.spinning .wheel-glow {
            opacity: 1;
        }

        #wheel {
            width: 85%;
            height: 85%;
            border-radius: 50%;
            position: relative;
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5));
        }

        .wheel-border {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88%;
            height: 88%;
            border-radius: 50%;
            border: 4px solid var(--border);
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            border-radius: 50%;
            border: 3px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .wheel-center-inner {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* 指针 */
        .pointer {
            position: absolute;
            top: 3%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .pointer svg {
            width: 50px;
            height: 60px;
        }

        /* 开始按钮 */
        .spin-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #ff8555 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px var(--accent-glow);
            font-family: 'Noto Sans SC', sans-serif;
            letter-spacing: 2px;
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 50px var(--accent-glow);
        }

        .spin-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
            border-radius: 6px;
            font-size: 14px;
        }

        /* 选项输入区域 */
        .options-input {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .theme-input-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .theme-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .theme-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .theme-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .options-textarea {
            width: 100%;
            min-height: 150px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Noto Sans SC', sans-serif;
            resize: vertical;
            transition: border-color 0.3s ease;
            line-height: 1.8;
        }

        .options-textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .options-textarea::placeholder {
            color: var(--text-muted);
        }

        .input-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #ff8555 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 置灰开关 */
        .switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .switch-label {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .switch {
            position: relative;
            width: 52px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border);
            transition: 0.3s;
            border-radius: 28px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* 已保存选项组列表 */
        .saved-groups {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
        }

        .saved-groups::-webkit-scrollbar {
            width: 6px;
        }

        .saved-groups::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }

        .saved-groups::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .saved-group-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .saved-group-item:hover {
            border-color: var(--accent);
            background: rgba(255, 107, 53, 0.05);
        }

        .saved-group-item.active {
            border-color: var(--accent);
            background: rgba(255, 107, 53, 0.1);
        }

        .group-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .group-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .group-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .group-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .icon-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(248, 113, 113, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* 保存弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            margin-bottom: 20px;
        }

        .modal-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        /* 结果弹窗 */
        .result-modal .modal {
            text-align: center;
            max-width: 450px;
        }

        .result-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .result-text {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 24px;
            word-break: break-word;
        }

        /* 重置按钮 */
        .reset-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px dashed var(--border);
            border-radius: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .reset-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 选项预览标签 */
        .options-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .option-tag {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .option-tag.disabled {
            opacity: 0.4;
            text-decoration: line-through;
            background: transparent;
        }

        .option-tag .tag-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            z-index: 1001;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error {
            border-color: var(--danger);
            color: var(--danger);
        }

        .toast.success {
            border-color: var(--success);
            color: var(--success);
        }

        /* 响应式调整 */
        @media (max-width: 1000px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .wheel-container {
                max-width: 350px;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .spin-btn {
                padding: 14px 40px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="grid-overlay"></div>
    </div>

    <div class="app-container">
        <header>
            <h1>🎯 幸运转盘</h1>
            <p class="subtitle">输入选项，转动命运，随机决定一切</p>
            <p class="subtitle" id="themeDisplay" style="margin-top: 6px; font-size: 0.9rem; color: var(--accent-secondary);"></p>
        </header>

        <!-- 转盘区域 -->
        <section class="wheel-section">
            <div class="wheel-container">
                <div class="wheel-wrapper" id="wheelWrapper">
                    <div class="wheel-glow"></div>
                    <canvas id="wheel" width="500" height="500"></canvas>
                    <div class="wheel-border"></div>
                    <div class="wheel-center">
                        <div class="wheel-center-inner"></div>
                    </div>
                    <div class="pointer">
                        <svg viewBox="0 0 50 60" fill="none">
                            <path d="M25 60L5 20C5 8.954 13.954 0 25 0s20 8.954 20 20L25 60z" fill="url(#pointerGrad)"/>
                            <defs>
                                <linearGradient id="pointerGrad" x1="25" y1="0" x2="25" y2="60" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#ff6b35"/>
                                    <stop offset="1" stop-color="#f7c94b"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                </div>
            </div>

            <button class="spin-btn" id="spinBtn" disabled>开始抽奖</button>

            <div class="options-preview" id="optionsPreview"></div>
        </section>

        <!-- 侧边栏 -->
        <aside class="sidebar">
            <!-- 选项输入卡片 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <span class="icon">📝</span>
                        输入选项
                    </h2>
                </div>
                <div class="options-input">
                    <div class="theme-input-row">
                        <label for="themeInput" class="theme-label">抽奖主题</label>
                        <input 
                            type="text" 
                            id="themeInput" 
                            class="theme-input" 
                            placeholder="例如：今晚吃什么、部门抽奖、任务分配"
                        >
                    </div>
                    <textarea 
                        class="options-textarea" 
                        id="optionsInput"
                        placeholder="每行输入一个选项，例如：&#10;火锅&#10;烧烤&#10;披萨&#10;汉堡&#10;寿司"
                    ></textarea>
                    <p class="input-hint">每行一个选项，至少需要2个选项</p>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="confirmBtn">确定</button>
                        <button class="btn btn-secondary" id="saveBtn" disabled>保存选项组</button>
                    </div>
                </div>
            </div>

            <!-- 设置卡片 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <span class="icon">⚙️</span>
                        抽奖设置
                    </h2>
                </div>
                <div class="switch-row">
                    <span class="switch-label">抽中后置灰（不重复抽取）</span>
                    <label class="switch">
                        <input type="checkbox" id="grayOutSwitch">
                        <span class="slider"></span>
                    </label>
                </div>
                <button class="reset-btn" id="resetBtn">🔄 重置所有置灰选项</button>
            </div>

            <!-- 已保存选项组 -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">
                        <span class="icon">📁</span>
                        已保存选项组
                    </h2>
                </div>
                <div class="saved-groups" id="savedGroups">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无保存的选项组</p>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- 保存弹窗 -->
    <div class="modal-overlay" id="saveModal">
        <div class="modal">
            <h3 class="modal-title">💾 保存选项组</h3>
            <input type="text" class="modal-input" id="groupNameInput" placeholder="输入选项组名称">
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="cancelSaveBtn">取消</button>
                <button class="btn btn-primary" id="confirmSaveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="modal-overlay result-modal" id="resultModal">
        <div class="modal">
            <div class="result-icon">🎉</div>
            <p class="result-text">恭喜！抽中了</p>
            <div class="result-value" id="resultValue"></div>
            <button class="btn btn-primary" id="closeResultBtn" style="width: 100%;">知道了</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // 转盘颜色方案
        const COLORS = [
            '#FF6B35', '#F7C94B', '#4ECDC4', '#45B7D1', '#96CEB4',
            '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE',
            '#85C1E9', '#F8B500', '#FF7675', '#74B9FF', '#A29BFE'
        ];

        // 应用状态
        let state = {
            options: [],
            disabledOptions: new Set(),
            currentRotation: 0,
            isSpinning: false,
            savedGroups: [],
            grayOutEnabled: false,
            theme: ''
        };

        // DOM 元素
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const wheelWrapper = document.getElementById('wheelWrapper');
        const spinBtn = document.getElementById('spinBtn');
        const optionsInput = document.getElementById('optionsInput');
        const confirmBtn = document.getElementById('confirmBtn');
        const saveBtn = document.getElementById('saveBtn');
        const savedGroupsContainer = document.getElementById('savedGroups');
        const optionsPreview = document.getElementById('optionsPreview');
        const grayOutSwitch = document.getElementById('grayOutSwitch');
        const resetBtn = document.getElementById('resetBtn');
        const saveModal = document.getElementById('saveModal');
        const groupNameInput = document.getElementById('groupNameInput');
        const cancelSaveBtn = document.getElementById('cancelSaveBtn');
        const confirmSaveBtn = document.getElementById('confirmSaveBtn');
        const resultModal = document.getElementById('resultModal');
        const resultValue = document.getElementById('resultValue');
        const closeResultBtn = document.getElementById('closeResultBtn');
        const toast = document.getElementById('toast');
        const themeInput = document.getElementById('themeInput');
        const themeDisplay = document.getElementById('themeDisplay');

        // 初始化
        function init() {
            loadFromStorage();
            renderSavedGroups();
            drawWheel();
            bindEvents();
        }

        // 绑定事件
        function bindEvents() {
            confirmBtn.addEventListener('click', handleConfirm);
            spinBtn.addEventListener('click', handleSpin);
            saveBtn.addEventListener('click', () => showModal(saveModal));
            cancelSaveBtn.addEventListener('click', () => hideModal(saveModal));
            confirmSaveBtn.addEventListener('click', handleSaveGroup);
            closeResultBtn.addEventListener('click', () => hideModal(resultModal));
            grayOutSwitch.addEventListener('change', handleGrayOutToggle);
            resetBtn.addEventListener('click', handleReset);
            themeInput.addEventListener('input', handleThemeChange);
            
            // Enter 键保存
            groupNameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSaveGroup();
            });

            // 点击遮罩关闭弹窗
            saveModal.addEventListener('click', (e) => {
                if (e.target === saveModal) hideModal(saveModal);
            });
            resultModal.addEventListener('click', (e) => {
                if (e.target === resultModal) hideModal(resultModal);
            });
        }

        // 确定选项
        function handleConfirm() {
            const text = optionsInput.value.trim();
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            
            if (lines.length < 2) {
                showToast('请至少输入2个选项', 'error');
                return;
            }

            if (lines.length > 50) {
                showToast('最多支持50个选项', 'error');
                return;
            }

            state.options = lines;
            state.disabledOptions.clear();
            
            drawWheel();
            renderOptionsPreview();
            updateButtons();
            showToast('选项已更新！', 'success');
        }

        // 绘制转盘
        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) - 10;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (state.options.length === 0) {
                // 绘制空白转盘
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a24';
                ctx.fill();
                ctx.strokeStyle = '#2a2a3a';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.fillStyle = '#606070';
                ctx.font = '20px "Noto Sans SC"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('请输入选项', centerX, centerY);
                return;
            }

            const sliceAngle = (Math.PI * 2) / state.options.length;

            state.options.forEach((option, index) => {
                const startAngle = index * sliceAngle - Math.PI / 2;
                const endAngle = startAngle + sliceAngle;
                const isDisabled = state.disabledOptions.has(index);

                // 绘制扇形
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();

                // 颜色
                let color = COLORS[index % COLORS.length];
                if (isDisabled) {
                    ctx.fillStyle = '#3a3a4a';
                } else {
                    ctx.fillStyle = color;
                }
                ctx.fill();

                // 边框
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 文字
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + sliceAngle / 2);
                
                const textRadius = radius * 0.65;
                ctx.fillStyle = isDisabled ? '#606070' : '#ffffff';
                ctx.font = `bold ${Math.min(16, 200 / state.options.length)}px "Noto Sans SC"`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // 截断过长文字
                let displayText = option;
                if (displayText.length > 8) {
                    displayText = displayText.substring(0, 7) + '...';
                }
                
                ctx.fillText(displayText, textRadius, 0);
                ctx.restore();
            });

            // 外圈装饰
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        // 开始旋转
        function handleSpin() {
            if (state.isSpinning || state.options.length < 2) return;

            // 检查可用选项
            const availableIndices = state.options
                .map((_, i) => i)
                .filter(i => !state.disabledOptions.has(i));

            if (availableIndices.length === 0) {
                showToast('所有选项已抽完，请重置后再试', 'error');
                return;
            }

            state.isSpinning = true;
            spinBtn.disabled = true;
            wheelWrapper.classList.add('spinning');

            // 随机选择一个可用选项
            const winnerIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
            
            // 计算旋转角度
            const sliceAngle = 360 / state.options.length;
            const targetAngle = 360 - (winnerIndex * sliceAngle + sliceAngle / 2);
            const totalRotation = 360 * 5 + targetAngle; // 至少转5圈
            
            animateSpin(totalRotation, winnerIndex);
        }

        // 旋转动画
        function animateSpin(totalRotation, winnerIndex) {
            const startRotation = state.currentRotation;
            const endRotation = startRotation + totalRotation;
            const duration = 4000;
            const startTime = performance.now();

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // 缓动函数 (ease-out)
                const easeOut = 1 - Math.pow(1 - progress, 4);
                
                state.currentRotation = startRotation + totalRotation * easeOut;
                canvas.style.transform = `rotate(${state.currentRotation}deg)`;

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // 动画结束
                    state.isSpinning = false;
                    wheelWrapper.classList.remove('spinning');
                    
                    // 处理置灰
                    if (state.grayOutEnabled) {
                        state.disabledOptions.add(winnerIndex);
                        drawWheel();
                        renderOptionsPreview();
                        saveToStorage();
                    }

                    updateButtons();
                    
                    // 显示结果
                    resultValue.textContent = state.options[winnerIndex];
                    showModal(resultModal);
                }
            }

            requestAnimationFrame(animate);
        }

        // 渲染选项预览标签
        function renderOptionsPreview() {
            if (state.options.length === 0) {
                optionsPreview.innerHTML = '';
                return;
            }

            optionsPreview.innerHTML = state.options.map((option, index) => {
                const isDisabled = state.disabledOptions.has(index);
                const color = COLORS[index % COLORS.length];
                return `
                    <span class="option-tag ${isDisabled ? 'disabled' : ''}">
                        <span class="tag-dot" style="background: ${isDisabled ? '#606070' : color}"></span>
                        ${option.length > 10 ? option.substring(0, 9) + '...' : option}
                    </span>
                `;
            }).join('');
        }

        // 更新按钮状态
        function updateButtons() {
            const hasOptions = state.options.length >= 2;
            const availableCount = state.options.filter((_, i) => !state.disabledOptions.has(i)).length;
            
            spinBtn.disabled = !hasOptions || state.isSpinning || availableCount === 0;
            saveBtn.disabled = !hasOptions;

            if (availableCount === 0 && hasOptions) {
                spinBtn.textContent = '已抽完';
            } else {
                spinBtn.textContent = '开始抽奖';
            }
        }

        // 置灰开关
        function handleGrayOutToggle() {
            state.grayOutEnabled = grayOutSwitch.checked;
            
            if (!state.grayOutEnabled) {
                state.disabledOptions.clear();
                drawWheel();
                renderOptionsPreview();
            }
            
            updateButtons();
            saveToStorage();
        }

        // 重置置灰
        function handleReset() {
            state.disabledOptions.clear();
            drawWheel();
            renderOptionsPreview();
            updateButtons();
            saveToStorage();
            showToast('已重置所有选项', 'success');
        }

        // 抽奖主题编辑
        function handleThemeChange() {
            state.theme = themeInput.value.trim();
            updateThemeDisplay();
            saveToStorage();
        }

        function updateThemeDisplay() {
            if (!themeDisplay) return;
            themeDisplay.textContent = state.theme ? `当前主题：${state.theme}` : '';
        }

        // 保存选项组
        function handleSaveGroup() {
            const name = groupNameInput.value.trim();
            
            if (!name) {
                showToast('请输入选项组名称', 'error');
                return;
            }

            if (state.options.length < 2) {
                showToast('请先确定选项', 'error');
                return;
            }

            // 检查是否已存在同名选项组
            const existingIndex = state.savedGroups.findIndex(g => g.name === name);
            
            const group = {
                name,
                options: [...state.options],
                createdAt: new Date().toISOString()
            };

            if (existingIndex >= 0) {
                state.savedGroups[existingIndex] = group;
                showToast('选项组已更新', 'success');
            } else {
                if (state.savedGroups.length >= 20) {
                    showToast('最多保存20个选项组', 'error');
                    return;
                }
                state.savedGroups.push(group);
                showToast('保存成功！', 'success');
            }

            saveToStorage();
            renderSavedGroups();
            hideModal(saveModal);
            groupNameInput.value = '';
        }

        // 加载选项组
        function loadGroup(index) {
            const group = state.savedGroups[index];
            if (!group) return;

            state.options = [...group.options];
            state.disabledOptions.clear();
            optionsInput.value = group.options.join('\n');
            
            drawWheel();
            renderOptionsPreview();
            updateButtons();
            showToast(`已加载「${group.name}」`, 'success');
        }

        // 删除选项组
        function deleteGroup(index, event) {
            event.stopPropagation();
            state.savedGroups.splice(index, 1);
            saveToStorage();
            renderSavedGroups();
            showToast('已删除', 'success');
        }

        // 渲染已保存选项组
        function renderSavedGroups() {
            if (state.savedGroups.length === 0) {
                savedGroupsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无保存的选项组</p>
                    </div>
                `;
                return;
            }

            savedGroupsContainer.innerHTML = state.savedGroups.map((group, index) => `
                <div class="saved-group-item" onclick="loadGroup(${index})">
                    <div class="group-info">
                        <span class="group-name">${group.name}</span>
                        <span class="group-meta">${group.options.length} 个选项</span>
                    </div>
                    <div class="group-actions">
                        <button class="icon-btn" onclick="deleteGroup(${index}, event)" title="删除">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // 本地存储
        function saveToStorage() {
            const data = {
                savedGroups: state.savedGroups,
                grayOutEnabled: state.grayOutEnabled,
                currentOptions: state.options,
                disabledOptions: Array.from(state.disabledOptions),
                theme: state.theme
            };
            localStorage.setItem('wheelApp', JSON.stringify(data));
        }

        function loadFromStorage() {
            try {
                const data = JSON.parse(localStorage.getItem('wheelApp'));
                if (data) {
                    state.savedGroups = data.savedGroups || [];
                    state.grayOutEnabled = data.grayOutEnabled || false;
                    state.options = data.currentOptions || [];
                    state.disabledOptions = new Set(data.disabledOptions || []);
                    state.theme = data.theme || '';
                    
                    grayOutSwitch.checked = state.grayOutEnabled;
                    if (state.options.length > 0) {
                        optionsInput.value = state.options.join('\n');
                        drawWheel();
                        renderOptionsPreview();
                        updateButtons();
                    }
                    if (themeInput) {
                        themeInput.value = state.theme;
                    }
                    updateThemeDisplay();
                }
            } catch (e) {
                console.error('Failed to load from storage:', e);
            }
        }

        // 弹窗控制
        function showModal(modal) {
            modal.classList.add('active');
            if (modal === saveModal) {
                groupNameInput.focus();
            }
        }

        function hideModal(modal) {
            modal.classList.remove('active');
        }

        // Toast 提示
        function showToast(message, type = '') {
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // 启动应用
        init();
    </script>
</body>
</html>
